<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italiano · Apprendre l'italien</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   1. DESIGN TOKENS — Palette tricolore italienne + dorures
   ============================================================ */
:root{
  /* Verde, Bianco, Rosso */
  --verde-900:#0b3d22;
  --verde-800:#0f4d2b;
  --verde-700:#136338;
  --verde-600:#1a7a47;
  --verde-500:#228a52;
  --verde-300:#7bb896;
  --verde-100:#e3f0e8;
  --verde-50:#f2f8f4;

  --rosso-900:#5c1018;
  --rosso-800:#7a1722;
  --rosso-700:#9c1f2e;
  --rosso-600:#b8293a;
  --rosso-500:#c73a4a;
  --rosso-300:#e0939c;
  --rosso-100:#fbe7e9;
  --rosso-50:#fdf3f4;

  --avorio-50:#fdfbf6;
  --avorio-100:#f8f3e8;
  --avorio-200:#f0e7d3;
  --avorio-300:#e4d6b8;

  --oro-400:#caa45e;
  --oro-500:#b8923f;
  --oro-600:#9c7a30;
  --oro-glow:#e8c878;

  --inchiostro-900:#1c1813;
  --inchiostro-700:#3a342b;
  --inchiostro-500:#5e564a;
  --inchiostro-300:#8a8072;

  --font-display:'Fraunces', serif;
  --font-serif-it:'Cormorant Garamond', serif;
  --font-body:'Inter', sans-serif;

  --bg-app:var(--avorio-50);
  --bg-panel:#ffffff;
  --bg-sidebar:#fffefb;
  --bg-card:#ffffff;
  --bg-elevated:#ffffff;
  --text-primary:var(--inchiostro-900);
  --text-secondary:var(--inchiostro-500);
  --text-muted:var(--inchiostro-300);
  --border-soft:rgba(28,24,19,0.09);
  --border-mid:rgba(28,24,19,0.14);
  --shadow-card:0 1px 2px rgba(28,24,19,0.04), 0 6px 18px rgba(28,24,19,0.06);
  --shadow-elevated:0 4px 12px rgba(28,24,19,0.07), 0 16px 40px rgba(28,24,19,0.10);
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --radius-xl:22px;

  --sidebar-w:300px;
}

html.dark{
  --bg-app:#100f0d;
  --bg-panel:#171411;
  --bg-sidebar:#15120f;
  --bg-card:#1c1814;
  --bg-elevated:#221d18;
  --text-primary:#f3ece0;
  --text-secondary:#c9bda9;
  --text-muted:#8a7d68;
  --border-soft:rgba(243,236,224,0.08);
  --border-mid:rgba(243,236,224,0.14);
  --shadow-card:0 1px 2px rgba(0,0,0,0.3), 0 6px 18px rgba(0,0,0,0.35);
  --shadow-elevated:0 4px 14px rgba(0,0,0,0.4), 0 20px 48px rgba(0,0,0,0.5);

  --verde-100:#173823;
  --verde-50:#12241a;
  --rosso-100:#3a161a;
  --rosso-50:#241012;
  --avorio-100:#241f18;
  --avorio-200:#2c261d;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg-app);
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,h4{font-family:var(--font-display); font-weight:600; margin:0; color:var(--text-primary);}
p{margin:0;}
button{font-family:var(--font-body); cursor:pointer;}
a{color:inherit;}
::selection{background:var(--oro-glow); color:var(--inchiostro-900);}

/* Scrollbar */
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-mid); border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--oro-500);}

/* ============================================================
   2. BACKGROUND ORNAMENTS — colonnes, laurier, motifs discrets
   ============================================================ */
.bg-ornament{
  position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
}
.bg-ornament svg{position:absolute; opacity:0.045;}
html.dark .bg-ornament svg{opacity:0.07;}
.leaf-fall{
  position:fixed; top:-40px; pointer-events:none; z-index:1;
  opacity:0.5; will-change:transform;
}
html.dark .leaf-fall{opacity:0.35;}

/* ============================================================
   3. LAYOUT SHELL
   ============================================================ */
.app-shell{
  position:relative; z-index:2;
  display:flex; min-height:100vh; width:100%;
}

/* ---------- Sidebar ---------- */
.sidebar{
  width:var(--sidebar-w); flex-shrink:0;
  background:var(--bg-sidebar);
  border-right:1px solid var(--border-soft);
  display:flex; flex-direction:column;
  height:100vh; position:sticky; top:0;
  transition:width 0.32s cubic-bezier(.4,0,.2,1), margin-left 0.32s cubic-bezier(.4,0,.2,1);
  z-index:40;
}
.sidebar.collapsed{ width:76px; }
.sidebar-head{
  display:flex; align-items:center; gap:12px;
  padding:22px 20px 18px;
  border-bottom:1px solid var(--border-soft);
  flex-shrink:0;
  min-height:84px;
}
.logo-mark{ width:42px; height:42px; flex-shrink:0; }
.brand-text{ overflow:hidden; white-space:nowrap; transition:opacity 0.2s; }
.sidebar.collapsed .brand-text{ opacity:0; width:0; }
.brand-title{ font-family:var(--font-display); font-size:21px; font-weight:600; letter-spacing:0.2px; color:var(--text-primary); line-height:1.1;}
.brand-sub{ font-family:var(--font-serif-it); font-style:italic; font-size:12.5px; color:var(--oro-600); margin-top:2px;}
html.dark .brand-sub{ color:var(--oro-400); }

.sidebar-toggle{
  margin-left:auto; width:30px; height:30px; border-radius:50%;
  border:1px solid var(--border-mid); background:var(--bg-panel);
  display:flex; align-items:center; justify-content:center;
  color:var(--text-secondary); flex-shrink:0; transition:all 0.2s;
}
.sidebar-toggle:hover{ border-color:var(--oro-500); color:var(--oro-600); }
.sidebar.collapsed .sidebar-toggle{ margin-left:0; }

.sidebar-scroll{
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:14px 12px 18px;
}
.sidebar.collapsed .sidebar-scroll{ padding:14px 10px; }

.sidebar-foot{
  border-top:1px solid var(--border-soft);
  padding:14px 16px 16px;
  flex-shrink:0;
}

/* ---------- Main column ---------- */
.main-col{
  flex:1; min-width:0; display:flex; flex-direction:column;
  position:relative;
}
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; gap:16px;
  padding:0 28px; height:72px;
  background:rgba(253,251,246,0.86);
  backdrop-filter:blur(10px) saturate(1.4);
  -webkit-backdrop-filter:blur(10px) saturate(1.4);
  border-bottom:1px solid var(--border-soft);
}
html.dark .topbar{ background:rgba(16,15,13,0.82); }
.hamburger{
  display:none; width:38px; height:38px; border-radius:var(--radius-sm);
  border:1px solid var(--border-mid); background:var(--bg-panel);
  align-items:center; justify-content:center; color:var(--text-primary);
}
.page-title-wrap{ min-width:0; flex:1; }
.page-eyebrow{
  font-size:11px; letter-spacing:1.4px; text-transform:uppercase;
  color:var(--oro-600); font-weight:600; margin-bottom:2px;
}
html.dark .page-eyebrow{ color:var(--oro-400); }
.page-title{ font-size:22px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.topbar-stats{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
.stat-pill{
  display:flex; align-items:center; gap:6px;
  padding:7px 13px; border-radius:999px;
  background:var(--bg-panel); border:1px solid var(--border-soft);
  font-size:13px; font-weight:600; color:var(--text-secondary);
  white-space:nowrap;
}
.stat-pill .ic{ font-size:15px; }
.stat-pill.streak{ color:var(--rosso-700); border-color:var(--rosso-100); background:var(--rosso-50); }
html.dark .stat-pill.streak{ color:#f0a3ad; }
.stat-pill.xp{ color:var(--verde-700); border-color:var(--verde-100); background:var(--verde-50); }
html.dark .stat-pill.xp{ color:#7bd9a5; }

.content-area{
  flex:1; padding:28px 32px 80px;
  max-width:1180px; width:100%; margin:0 auto;
}

/* ============================================================
   4. SIDEBAR NAV — accordéons CECR
   ============================================================ */
.nav-group{ margin-bottom:6px; }
.level-header{
  display:flex; align-items:center; gap:11px;
  width:100%; padding:11px 12px; border-radius:var(--radius-md);
  background:transparent; border:none; text-align:left;
  transition:background 0.18s;
  position:relative;
}
.level-header:hover{ background:var(--bg-panel); }
.level-badge{
  width:34px; height:34px; border-radius:9px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:13.5px;
  color:#fff; letter-spacing:0.3px;
}
.lvl-a{ background:linear-gradient(145deg, var(--verde-600), var(--verde-800)); }
.lvl-b{ background:linear-gradient(145deg, var(--oro-500), var(--oro-600)); }
.lvl-c{ background:linear-gradient(145deg, var(--rosso-600), var(--rosso-800)); }

.level-info{ flex:1; min-width:0; overflow:hidden; }
.sidebar.collapsed .level-info{ display:none; }
.level-name{ font-size:14px; font-weight:600; color:var(--text-primary); }
.level-meta{ font-size:11.5px; color:var(--text-muted); margin-top:1px; }
.level-chevron{
  color:var(--text-muted); flex-shrink:0; transition:transform 0.25s;
  display:flex;
}
.sidebar.collapsed .level-chevron{ display:none; }
.level-header[aria-expanded="true"] .level-chevron{ transform:rotate(180deg); }

.lesson-list{
  overflow:hidden; max-height:0; transition:max-height 0.32s cubic-bezier(.4,0,.2,1);
  padding-left:16px; margin-left:17px; border-left:1px dashed var(--border-mid);
}
.lesson-list.open{ max-height:900px; }
.sidebar.collapsed .lesson-list{ display:none; }
.lesson-item{
  display:flex; align-items:center; gap:9px;
  padding:8px 10px 8px 12px; margin:1px 4px;
  border-radius:var(--radius-sm); font-size:13px;
  color:var(--text-secondary); position:relative;
  transition:background 0.15s, color 0.15s;
}
.lesson-item:hover{ background:var(--bg-panel); color:var(--text-primary); }
.lesson-item.active{ background:var(--verde-100); color:var(--verde-800); font-weight:600; }
html.dark .lesson-item.active{ color:#9bdfb8; }
.lesson-num{
  width:19px; height:19px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; background:var(--avorio-200); color:var(--text-muted);
}
.lesson-item.active .lesson-num{ background:var(--verde-600); color:#fff; }
.lesson-item.done .lesson-num{ background:var(--verde-600); color:#fff; }
.lesson-label{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lesson-check{ color:var(--verde-600); font-size:13px; flex-shrink:0; }

.sidebar-divider{
  height:1px; background:var(--border-soft); margin:14px 8px;
}
.sidebar-section-label{
  font-size:10.5px; letter-spacing:1.2px; text-transform:uppercase;
  color:var(--text-muted); font-weight:700; padding:4px 12px 8px;
}
.sidebar.collapsed .sidebar-section-label{ display:none; }
.fixed-nav-item{
  display:flex; align-items:center; gap:12px;
  padding:10px 12px; border-radius:var(--radius-md);
  font-size:13.5px; font-weight:600; color:var(--text-secondary);
  margin-bottom:2px; transition:all 0.15s;
}
.fixed-nav-item:hover{ background:var(--bg-panel); color:var(--text-primary); }
.fixed-nav-item.active{ background:var(--inchiostro-900); color:var(--avorio-50); }
html.dark .fixed-nav-item.active{ background:var(--oro-500); color:#1c1813; }
.fixed-nav-item .ic{ font-size:17px; flex-shrink:0; width:20px; text-align:center; }
.sidebar.collapsed .fixed-nav-item span:not(.ic){ display:none; }
.sidebar.collapsed .fixed-nav-item{ justify-content:center; }
.sidebar.collapsed .level-header{ justify-content:center; }

/* Mobile overlay */
.sidebar-scrim{
  display:none; position:fixed; inset:0; background:rgba(20,16,10,0.5);
  z-index:39; backdrop-filter:blur(2px);
}
.sidebar-scrim.show{ display:block; }

@media (max-width: 860px){
  .sidebar{
    position:fixed; left:0; top:0; height:100vh;
    transform:translateX(-100%);
    width:300px !important;
    box-shadow:var(--shadow-elevated);
  }
  .sidebar.mobile-open{ transform:translateX(0); }
  .hamburger{ display:flex; }
  .sidebar-toggle{ display:none; }
  .content-area{ padding:20px 16px 60px; }
  .topbar{ padding:0 16px; gap:10px; }
  .topbar-stats{ gap:6px; }
  .stat-pill span:not(.ic){ display:none; }
  .stat-pill{ padding:8px; }
}

/* ============================================================
   5. HOME / DASHBOARD
   ============================================================ */
.hero-banner{
  position:relative; border-radius:var(--radius-xl); overflow:hidden;
  padding:46px 42px; margin-bottom:30px;
  background:
    radial-gradient(ellipse at 15% 20%, rgba(255,255,255,0.10), transparent 50%),
    linear-gradient(120deg, var(--verde-800) 0%, var(--verde-700) 38%, var(--oro-600) 68%, var(--rosso-700) 100%);
  color:#fdfbf6; box-shadow:var(--shadow-elevated);
}
.hero-banner::after{
  content:''; position:absolute; inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.55) 0.7px, transparent 0.7px);
  background-size:18px 18px; opacity:0.05; pointer-events:none;
}
.hero-eyebrow{ font-family:var(--font-serif-it); font-style:italic; font-size:18px; opacity:0.92; margin-bottom:8px;}
.hero-title{ font-size:38px; color:#fff; line-height:1.12; max-width:560px; margin-bottom:14px;}
.hero-text{ font-size:15px; opacity:0.88; max-width:480px; line-height:1.6; margin-bottom:26px;}
.hero-cta{
  display:inline-flex; align-items:center; gap:9px;
  background:#fdfbf6; color:var(--verde-900); font-weight:700; font-size:14.5px;
  padding:13px 26px; border-radius:999px; border:none;
  box-shadow:0 8px 20px rgba(0,0,0,0.18); transition:transform 0.18s;
}
.hero-cta:hover{ transform:translateY(-2px); }

.dash-grid{
  display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:30px;
}
@media (max-width:760px){ .dash-grid{ grid-template-columns:repeat(2,1fr);} }
.metric-card{
  background:var(--bg-card); border:1px solid var(--border-soft); border-radius:var(--radius-lg);
  padding:18px 20px; box-shadow:var(--shadow-card);
}
.metric-icon{ font-size:20px; margin-bottom:10px; }
.metric-val{ font-family:var(--font-display); font-size:27px; font-weight:700; color:var(--text-primary); }
.metric-lbl{ font-size:12.5px; color:var(--text-secondary); margin-top:3px; font-weight:500; }

.section-heading{
  display:flex; align-items:baseline; gap:12px; margin:36px 0 16px;
}
.section-heading h2{ font-size:21px; }
.section-heading .rule{ flex:1; height:1px; background:var(--border-soft); }

.level-cards-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(230px,1fr)); gap:14px; }
.level-card{
  background:var(--bg-card); border:1px solid var(--border-soft); border-radius:var(--radius-lg);
  padding:20px; box-shadow:var(--shadow-card); position:relative; overflow:hidden;
  transition:transform 0.2s, box-shadow 0.2s;
}
.level-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-elevated); }
.level-card::before{
  content:''; position:absolute; top:0; left:0; width:5px; height:100%;
}
.level-card.la::before{ background:linear-gradient(var(--verde-600), var(--verde-800)); }
.level-card.lb::before{ background:linear-gradient(var(--oro-500), var(--oro-600)); }
.level-card.lc::before{ background:linear-gradient(var(--rosso-600), var(--rosso-800)); }
.level-card-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;}
.level-card-title{ font-size:17px; }
.level-card-sub{ font-size:12px; color:var(--text-muted); margin-top:2px;}
.level-card-prog{ height:5px; background:var(--avorio-200); border-radius:4px; overflow:hidden; margin-top:14px;}
.level-card-prog-fill{ height:100%; border-radius:4px; }

/* ============================================================
   6. LESSON CARD SYSTEM
   ============================================================ */
.lesson-breadcrumb{
  font-size:12.5px; color:var(--text-muted); margin-bottom:6px; display:flex; gap:6px; align-items:center;
}
.lesson-intro{ font-family:var(--font-serif-it); font-style:italic; font-size:18px; color:var(--text-secondary); max-width:680px; margin-bottom:28px; line-height:1.55;}

.card{
  background:var(--bg-card); border:1px solid var(--border-soft); border-radius:var(--radius-lg);
  padding:28px 30px; margin-bottom:22px; box-shadow:var(--shadow-card);
}
.card h3{
  font-size:18.5px; display:flex; align-items:center; gap:10px; margin-bottom:14px;
  padding-bottom:12px; border-bottom:1px solid var(--border-soft);
}
.card h3 .card-num{
  width:26px; height:26px; border-radius:7px; background:var(--verde-100); color:var(--verde-800);
  font-family:var(--font-body); font-size:12px; font-weight:700;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
html.dark .card h3 .card-num{ background:var(--verde-100); color:#9bdfb8; }
.card p{ font-size:15px; line-height:1.75; color:var(--text-secondary); margin-bottom:12px; }
.card p:last-child{ margin-bottom:0; }
.card ul, .card ol{ margin:0 0 12px; padding-left:22px; color:var(--text-secondary); font-size:15px; line-height:1.8;}
.card strong{ color:var(--text-primary); font-weight:600; }
.card em.it{ font-family:var(--font-serif-it); font-style:italic; color:var(--verde-700); font-weight:600; font-size:1.04em;}
html.dark .card em.it{ color:#8fd4ac; }

.course-table-wrap{ overflow-x:auto; margin:16px 0; border-radius:var(--radius-md); border:1px solid var(--border-soft); }
table.course-table{ width:100%; border-collapse:collapse; font-size:14px; min-width:420px;}
table.course-table thead th{
  background:linear-gradient(135deg, var(--verde-800), var(--verde-700));
  color:#fdfbf6; text-align:left; padding:11px 16px; font-weight:600; font-size:12.5px;
  letter-spacing:0.3px; text-transform:uppercase;
}
table.course-table tbody td{
  padding:11px 16px; border-top:1px solid var(--border-soft); color:var(--text-secondary);
}
table.course-table tbody tr:nth-child(even){ background:var(--avorio-50); }
html.dark table.course-table tbody tr:nth-child(even){ background:var(--bg-elevated); }
table.course-table tbody td:first-child{ font-weight:600; color:var(--text-primary); font-family:var(--font-serif-it); font-style:italic; font-size:15.5px;}
table.course-table tbody tr:hover{ background:var(--verde-50); }
html.dark table.course-table tbody tr:hover{ background:var(--verde-50); }

.alert-box{
  display:flex; gap:12px; padding:16px 18px; border-radius:var(--radius-md);
  background:var(--oro-glow); background:linear-gradient(135deg, #fbf3e3, #f5e6c8);
  border:1px solid var(--oro-400); margin:18px 0;
}
html.dark .alert-box{ background:linear-gradient(135deg, #2c2415, #211b10); border-color:var(--oro-600); }
.alert-icon{ font-size:19px; flex-shrink:0; line-height:1.5;}
.alert-box-title{ font-weight:700; font-size:13.5px; color:var(--oro-600); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.4px;}
html.dark .alert-box-title{ color:var(--oro-400); }
.alert-box p{ font-size:14px; color:var(--text-primary); margin:0; line-height:1.6; }

/* Vocab grid */
.vocab-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:12px; margin:18px 0;}
.vocab-card{
  background:var(--bg-elevated); border:1px solid var(--border-soft); border-radius:var(--radius-md);
  padding:16px; cursor:pointer; transition:all 0.18s; position:relative;
}
.vocab-card:hover{ border-color:var(--oro-500); transform:translateY(-2px); box-shadow:var(--shadow-card); }
.vocab-card .vc-it{ font-family:var(--font-serif-it); font-style:italic; font-weight:600; font-size:18px; color:var(--verde-800); margin-bottom:3px;}
html.dark .vocab-card .vc-it{ color:#9bdfb8; }
.vocab-card .vc-fr{ font-size:13px; color:var(--text-secondary); }
.vocab-card .vc-play{
  position:absolute; top:12px; right:12px; width:26px; height:26px; border-radius:50%;
  background:var(--avorio-200); display:flex; align-items:center; justify-content:center;
  font-size:11px; color:var(--text-muted); transition:all 0.18s;
}

}
function wordsLearnedCount(){
  return Math.min(VOCAB_ALL.length, state.completedLessons.size * 9 + 14);
}
function markComplete(lessonId){
  if(!state.completedLessons.has(lessonId)){
    state.completedLessons.add(lessonId);
    state.xp += 25;
    showToast('✓', 'Leçon terminée · +25 XP');
    updateTopbarStats();
    buildSidebar();
  }
}
function showToast(icon, msg){
  const t = document.getElementById('toast') || (() => {
    const el = document.createElement('div');
    el.id = 'toast'; el.className = 'toast';
    document.body.appendChild(el);
    return el;
  })();
  t.innerHTML = `<span class="ic">${icon}</span><span>${msg}</span>`;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}
function updateTopbarStats(){
  document.getElementById('streakStat').textContent = state.streak + ' jours';
  document.getElementById('xpStat').textContent = state.xp + ' XP';
}

function spawnLeaf(){
  const container = document.getElementById('leafContainer');
  const leaf = document.createElement('div');
  leaf.className = 'leaf-fall';
  const startX = Math.random() * window.innerWidth;
  const size = 10 + Math.random()*8;
  const duration = 9 + Math.random()*7;
  const hueChoice = Math.random();
  const color = hueChoice < 0.5 ? 'var(--verde-600)' : (hueChoice < 0.8 ? 'var(--oro-500)' : 'var(--rosso-600)');
  leaf.style.left = startX + 'px';
  leaf.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 24 24"><path d="M12 2 C18 8, 18 16, 12 22 C6 16, 6 8, 12 2 Z" fill="${color}"/></svg>`;
  document.body.appendChild(leaf);
  const drift = (Math.random()-0.5) * 160;
  const rot = 180 + Math.random()*360;
  leaf.animate([
    { transform:`translate(0,0) rotate(0deg)`, opacity:0 },
    { transform:`translate(${drift*0.3}px, ${window.innerHeight*0.3}px) rotate(${rot*0.4}deg)`, opacity:1, offset:0.15 },
    { transform:`translate(${drift}px, ${window.innerHeight+60}px) rotate(${rot}deg)`, opacity:0.7 }
  ], { duration: duration*1000, easing:'ease-in-out' }).onfinish = () => leaf.remove();
}
function startLeafLoop(){
  spawnLeaf();
  setInterval(spawnLeaf, 3200);
}

function speakItalian(text){
  if(!('speechSynthesis' in window)){ showToast('🔇','Synthèse vocale non disponible'); return; }
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'it-IT';
  utter.rate = state.audioSpeed;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

/* ================================================================
   ROUTER — loadContent(id, param)
   ================================================================ */
function loadContent(id, param){
  closeMobileSidebar();
  const area = document.getElementById('contentArea');
  setActiveFixedNav(id === 'lesson' ? null : id);

  if(id === 'home'){ renderHome(area); setEyebrow('Benvenuto','La tua casa italiana'); }
  else if(id === 'lesson'){ state.currentLesson = param; renderLesson(area, param); buildSidebar(); scrollTop(); }
  else if(id === 'exercises'){ renderExercisesHub(area); setEyebrow('Pratica','Exercices'); }
  else if(id === 'vocab'){ renderVocabDictionary(area); setEyebrow('Dizionario','Dictionnaire complet'); }
  else if(id === 'exams'){ renderExams(area); setEyebrow('Certificazione','Examens blancs'); }
  else if(id === 'progress'){ renderProgress(area); setEyebrow('Statistiche','Ta progression'); }
  else if(id === 'settings'){ renderSettings(area); setEyebrow('Configurazione','Paramètres'); }
  else { renderHome(area); }
  scrollTop();
}
function setEyebrow(eyebrow, title){
  document.getElementById('pageEyebrow').textContent = eyebrow;
  document.getElementById('pageTitle').textContent = title;
}
function scrollTop(){ document.getElementById('contentArea').scrollIntoView({behavior:'instant', block:'start'}); window.scrollTo(0,0); }

function startFlashcards(){
  const area = document.getElementById('contentArea');
  const wordsToPractice = VOCAB_ALL.slice(0, 15); // Utilisation d'un échantillon
  let currentCard = 0;
  
  const renderCard = () => {
    if(currentCard >= wordsToPractice.length) {
      state.xp += 15;
      updateTopbarStats();
      showToast('🏆', 'Session de révision terminée ! +15 XP');
      renderExercisesHub(area);
      return;
    }
    const w = wordsToPractice[currentCard];
    area.innerHTML = `
      <p class="lesson-intro" style="text-align:center;">Révision — Carte ${currentCard + 1} / ${wordsToPractice.length}</p>
      <div class="flash-stage">
        <div class="flashcard-3d" onclick="this.classList.toggle('flipped'); if(this.classList.contains('flipped')) speakItalian('${w.it.replace(/'/g,"\\'")}')">
          <div class="flashcard-inner">
            <div class="flashcard-face front">
              <div class="fc-word-it">${w.fr}</div>
              <div class="fc-hint-txt">Clique pour retourner</div>
            </div>
            <div class="flashcard-face back">
              <div class="fc-word-it">${w.it}</div>
              <div class="fc-hint-txt">🔊 Écouter la prononciation</div>
            </div>
          </div>
        </div>
        <div class="flash-controls">
          <button class="flash-btn dontknow" onclick="event.stopPropagation(); window.nextFlashcard(false)">À revoir</button>
          <button class="flash-btn know" onclick="event.stopPropagation(); window.nextFlashcard(true)">Je connaissais</button>
        </div>
      </div>
    `;
  };
  
  window.nextFlashcard = (knew) => {
    if(!knew) wordsToPractice.push(wordsToPractice[currentCard]); // Remet à la fin si erreur
    currentCard++;
    renderCard();
  };
  renderCard();
}

/* ================================================================
   LESSON RENDERER — switch par leçon
   ================================================================ */
function findLessonMeta(lessonId){
  for(const level of LEVELS){
    const l = level.lessons.find(x => x.id === lessonId);
    if(l) return {level, lesson:l, index: level.lessons.indexOf(l)};
  }
  return null;
}
function neighborLesson(lessonId, dir){
  const idx = ALL_LESSON_IDS.indexOf(lessonId);
  const ni = idx + dir;
  if(ni < 0 || ni >= ALL_LESSON_IDS.length) return null;
  return ALL_LESSON_IDS[ni];
}

function renderLesson(area, lessonId){
  const meta = findLessonMeta(lessonId);
  if(!meta){ renderHome(area); return; }
  const { level, lesson, index } = meta;
  setEyebrow(`Livello ${level.id}`, lesson.title);

  const bodyHtml = getLessonBody(lessonId);
  const isDone = state.completedLessons.has(lessonId);
  const prev = neighborLesson(lessonId, -1);
  const next = neighborLesson(lessonId, 1);
  const prevMeta = prev ? findLessonMeta(prev) : null;
  const nextMeta = next ? findLessonMeta(next) : null;

  area.innerHTML = `
    <div class="lesson-breadcrumb">${level.id} · ${level.name} · Leçon ${index+1}/${level.lessons.length}</div>
    <h1 style="font-size:30px; margin-bottom:10px;">${lesson.icon} ${lesson.title}</h1>
    ${bodyHtml}
    <div style="display:flex; justify-content:center; margin:30px 0;">
      <button class="complete-btn" ${isDone?'disabled':''} onclick="markComplete('${lessonId}'); renderLesson(document.getElementById('contentArea'), '${lessonId}')">
        ${isDone ? '✓ Leçon terminée' : 'Marquer comme terminée'}
      </button>
    </div>
    <div class="lesson-nav-footer">
      ${prevMeta ? `<div class="lesson-nav-btn" onclick="loadContent('lesson','${prev}')" style="cursor:pointer"><div class="lbl">← Précédent</div><div class="ttl">${prevMeta.lesson.title}</div></div>` : '<div></div>'}
      ${nextMeta ? `<div class="lesson-nav-btn" onclick="loadContent('lesson','${next}')" style="cursor:pointer; margin-left:auto; text-align:right"><div class="lbl">Suivant →</div><div class="ttl">${nextMeta.lesson.title}</div></div>` : '<div></div>'}
    </div>
  `;
}

function getLessonBody(id){
  const L = LESSON_CONTENT[id];
  if(!L) return `<div class="card"><p>Contenu en préparation.</p></div>`;
  return L();
}

    <h3><span class="card-num">1</span>Expressions et proverbes</h3>
    <ul>
      <li><em class="it">In bocca al lupo!</em> — bonne chance ! (littér. "dans la gueule du loup")</li>
      <li><em class="it">Avere le mani in pasta</em> — être impliqué dans quelque chose</li>
      <li><em class="it">Chi dorme non piglia pesci</em> — qui dort ne prend pas de poisson (il faut se lever tôt pour réussir)</li>
      <li><em class="it">Non è tutto oro quel che luccica</em> — tout ce qui brille n'est pas or</li>
    </ul>
  </div>
  ${renderAlertBox('À savoir', 'On répond à "In bocca al lupo" par "Crepi!" (que le loup crève) — jamais en répétant le souhait.')}
`,
'c2-1': () => `
  <p class="lesson-intro">L'italien littéraire et journalistique mobilise une syntaxe et un lexique propres.</p>
  <div class="card">
    <h3><span class="card-num">1</span>Caractéristiques stylistiques</h3>
    <p>La presse italienne privilégie les phrases longues à subordonnées multiples, l'usage fréquent du passif et du gérondif, et un lexique latinisant (<em class="it">orbene, peraltro, ovvero</em>).</p>
  </div>
  ${renderAlertBox('À savoir', 'La lecture régulière de journaux comme Corriere della Sera ou La Repubblica développe rapidement la compréhension du registre soutenu.')}
`,
'c2-2': () => `
  <p class="lesson-intro">Affine ta précision lexicale et évite les pièges des faux-amis franco-italiens.</p>
  <div class="card">
    <h3><span class="card-num">1</span>Faux-amis fréquents</h3>
    <div class="course-table-wrap"><table class="course-table">
      <thead><tr><th>Mot italien</th><th>Ressemble à</th><th>Signifie réellement</th></tr></thead>
      <tbody>
        ${FALSE_FRIENDS.map(f => `<tr><td>${f.it}</td><td>${f.faux}</td><td>${f.vrai}</td></tr>`).join('')}
      </tbody>
    </table></div>
  </div>
  ${renderAlertBox('Piège fréquent', '"Guardare" signifie "regarder", pas "garder" — pour "garder", on dira "tenere" ou "conservare".')}
`,
